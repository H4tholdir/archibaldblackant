services:
  # Frontend (React PWA served by Nginx)
  frontend:
    build:
      context: ./archibald-web-app/frontend
      dockerfile: Dockerfile
    container_name: archibald-frontend
    restart: unless-stopped
    networks:
      - archibald-net

  # Backend (Node.js + Puppeteer)
  backend:
    build:
      context: .
      dockerfile: ./archibald-web-app/backend/Dockerfile
    container_name: archibald-backend
    restart: unless-stopped
    stop_grace_period: 120s
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # Security: restrict CORS to known frontend origins (comma-separated)
      - CORS_ORIGINS=${CORS_ORIGINS:-https://formicanera.com}
      # Security: email address that receives mailto security alert links
      - SECURITY_ALERT_EMAIL=${SECURITY_ALERT_EMAIL}
    volumes:
      - ./logs:/app/logs  # Persist logs
      - product-images:/app/assets/product-images
      - recognition-images:/app/data/recognition-images
      - ./catalog:/app/catalog:ro
      - /home/deploy/komet-campionari:/app/komet-campionari:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - archibald-net

  # Redis (Job queue for BullMQ)
  redis:
    image: redis:7-alpine
    container_name: archibald-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data  # Persist Redis AOF
    networks:
      - archibald-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Nginx Reverse Proxy with SSL
  nginx-proxy:
    image: nginx:alpine
    container_name: archibald-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL certificates
      - ./nginx/dhparam.pem:/etc/nginx/dhparam.pem:ro  # DH params for SSL
    depends_on:
      - frontend
      - backend
    networks:
      - archibald-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://frontend/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL Backup to Hetzner Object Storage (run manually or via cron)
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: archibald-backup
    restart: 'no'
    env_file:
      - .env
    environment:
      - PG_HOST=${PG_HOST}
      - PG_USER=${PG_USER:-archibald}
      - PG_DATABASE=${PG_DATABASE:-archibald}
      - PG_PASSWORD=${PG_PASSWORD}
      - HETZNER_S3_ENDPOINT=${HETZNER_S3_ENDPOINT}
      - HETZNER_BUCKET=${HETZNER_BUCKET}
      - HETZNER_ACCESS_KEY=${HETZNER_ACCESS_KEY}
      - HETZNER_SECRET_KEY=${HETZNER_SECRET_KEY}
    networks:
      - archibald-net
    profiles:
      - backup

volumes:
  redis-data:
  product-images:
  recognition-images:

networks:
  archibald-net:
    driver: bridge
