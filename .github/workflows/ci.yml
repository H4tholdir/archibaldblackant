name: CI - Test & Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: archibald-web-app/backend/package-lock.json

      - name: Install dependencies
        working-directory: archibald-web-app/backend
        run: npm ci

      - name: Security audit backend
        working-directory: archibald-web-app/backend
        run: npm audit --audit-level=critical

      - name: Run TypeScript type check
        working-directory: archibald-web-app/backend
        run: npx tsc --noEmit

      - name: Run backend tests
        working-directory: archibald-web-app/backend
        run: npm test

      - name: Run linting
        working-directory: archibald-web-app/backend
        run: npm run lint || echo "Linting completed with warnings"

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: archibald-web-app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: archibald-web-app/frontend
        run: npm ci

      - name: Security audit frontend
        working-directory: archibald-web-app/frontend
        run: npm audit --audit-level=critical

      - name: Run TypeScript type check
        working-directory: archibald-web-app/frontend
        run: npm run type-check

      - name: Build frontend
        working-directory: archibald-web-app/frontend
        run: npm run build

  # build-docker rimosso: il CD già builda e pusha le immagini.
  # Buildare in parallelo causava conflitti sulla cache GHA (mode=max scrive
  # ogni layer, i due job si bloccavano a vicenda → timeout 30+ min).
